<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherd Data Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap');

        :root {
            --primary-color: #0f766e;
            --primary-hover: #115e59;
            --accent: #ea580c;
            --bg-color: #f8fafc;
            --bg-soft: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #cbd5e1;
            --danger-bg: #fef2f2;
            --danger-text: #b91c1c;
            --success: #16a34a;
            --shadow-lg: 0 20px 40px -28px rgba(15, 23, 42, 0.45);
            --shadow-sm: 0 8px 18px -14px rgba(15, 23, 42, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background:
                radial-gradient(circle at 12% 6%, rgba(15, 118, 110, 0.18), transparent 34%),
                radial-gradient(circle at 90% 92%, rgba(234, 88, 12, 0.12), transparent 36%),
                var(--bg-color);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }

        header h1 {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.65rem, 2.3vw, 2.1rem);
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .stats {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .search-toggle {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 0.9rem;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .search-panel {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(4px);
            padding: 1.1rem;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 1.25rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.9rem;
            border: 1px solid #dbe5ee;
        }

        .search-actions {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input, select {
            padding: 0.62rem 0.7rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: white;
            color: var(--text-main);
        }

        input:focus, select:focus,
        button:focus-visible {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
        }

        .btn-filter,
        .btn-ghost {
            border-radius: 10px;
            font-weight: 700;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 0.62rem 0.95rem;
            min-width: 120px;
            font-size: 0.88rem;
            transition: transform 0.15s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .btn-filter {
            background: var(--primary-color);
            color: white;
        }

        .btn-filter:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: white;
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .btn-ghost:hover {
            background: var(--bg-soft);
        }

        .error-banner {
            display: none;
            background: var(--danger-bg);
            color: var(--danger-text);
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .data-table-container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #dbe5ee;
            overflow: hidden;
            position: relative;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 840px;
            border-collapse: collapse;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background-color: #f7fafc;
            font-size: 0.72rem;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0.85rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 0.08em;
        }

        td {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #eef2f7;
            font-size: 0.9rem;
            vertical-align: middle;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .image-preview {
            width: 84px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #d8e2ea;
            background: #e2e8f0;
        }

        .image-preview:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 14px -10px rgba(15, 23, 42, 0.7);
        }

        .id-chip {
            background: #e6f4f1;
            color: #0f766e;
            border: 1px solid #99f6e4;
            border-radius: 6px;
            padding: 2px 6px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
            font-size: 0.8rem;
        }

        .btn-segment-small {
            padding: 5px 10px;
            font-size: 0.78rem;
            border-radius: 6px;
            background: #edfdfa;
            color: var(--primary-color);
            border: 1px solid #99f6e4;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
        }

        .btn-segment-small:hover {
            background: var(--primary-color);
            color: white;
        }

        .mobile-cards {
            display: none;
            grid-template-columns: 1fr;
            gap: 0.9rem;
        }

        .sherd-card {
            background: white;
            border-radius: 12px;
            padding: 0.85rem;
            border: 1px solid #dbe5ee;
            box-shadow: var(--shadow-sm);
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .card-img {
            width: 96px;
            height: 76px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #d8e2ea;
            background: #e2e8f0;
        }

        .card-info {
            flex: 1;
            font-size: 0.9rem;
        }

        .card-id {
            font-weight: 700;
            display: block;
            margin-bottom: 0.2rem;
            color: var(--primary-color);
            font-family: 'Space Grotesk', sans-serif;
        }

        .empty-state {
            display: none;
            text-align: center;
            padding: 2.25rem 1rem;
            color: var(--text-muted);
        }

        .empty-state strong {
            color: var(--text-main);
            display: block;
            margin-bottom: 0.3rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.45rem;
            margin-top: 1.25rem;
            flex-wrap: wrap;
        }

        .pagination-btn {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.43rem 0.72rem;
            min-width: 42px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .pagination-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #loading {
            text-align: center;
            padding: 1.5rem;
            display: none;
            color: var(--text-muted);
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 1rem;
        }

        .modal-container {
            position: relative;
            background: #1e293b;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 95vw;
            max-height: 95vh;
        }

        .preview-scroll-container {
            width: 100%;
            height: 70vh;
            overflow-x: auto;
            overflow-y: auto;
            scrollbar-gutter: stable both-edges;
            background: #0f172a;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .canvas-wrapper {
            position: relative;
            flex: 0 0 auto;
            line-height: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .modal-content {
            max-width: none;
            max-height: none;
            display: block;
        }

        #bboxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        #maskImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .modal-controls {
            display: flex;
            gap: 8px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary,
        .btn-secondary {
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
        }

        .btn-primary:disabled,
        .btn-secondary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .zoom-label {
            color: white;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
            font-weight: 700;
            min-width: 56px;
            text-align: center;
        }

        .modal-status {
            min-height: 1.2rem;
            color: #fca5a5;
            font-size: 0.86rem;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 900px) {
            .container {
                padding: 1rem;
            }

            .search-panel {
                grid-template-columns: repeat(2, minmax(140px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .search-toggle {
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .search-panel {
                display: none;
                grid-template-columns: 1fr;
            }

            .search-panel.active {
                display: grid;
            }

            .search-actions {
                width: 100%;
            }

            .btn-filter,
            .btn-ghost {
                flex: 1;
            }

            .data-table-container {
                display: none;
            }

            .mobile-cards {
                display: grid;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sherd Explorer</h1>
            <div class="stats" id="stats">0 items</div>
        </header>

        <div class="status-row">
            <button id="searchToggle" class="search-toggle" type="button" onclick="toggleSearch()">Show Filters</button>
            <div id="loading">Loading sherd data...</div>
        </div>

        <div id="errorBanner" class="error-banner"></div>

        <section class="search-panel" id="searchPanel">
            <div class="form-group">
                <label for="search">Global Search</label>
                <input type="text" id="search" placeholder="Search image or sherd ID">
            </div>
            <div class="form-group">
                <label for="unit">Unit</label>
                <select id="unit" onchange="applyFilters()">
                    <option value="">All Units</option>
                </select>
            </div>
            <div class="form-group">
                <label for="part">Part</label>
                <select id="part" onchange="applyFilters()">
                    <option value="">All Parts</option>
                </select>
            </div>
            <div class="form-group">
                <label for="type">Type</label>
                <select id="type" onchange="applyFilters()">
                    <option value="">All Types</option>
                </select>
            </div>
            <div class="form-group">
                <label for="side">Side</label>
                <select id="side" onchange="applyFilters()">
                    <option value="">All Sides</option>
                    <option value="exterior">Exterior</option>
                    <option value="interior">Interior</option>
                </select>
            </div>
            <div class="search-actions">
                <button class="btn-filter" type="button" onclick="applyFilters()">Apply Filters</button>
                <button class="btn-ghost" type="button" onclick="clearFilters()">Reset</button>
            </div>
        </section>

        <div class="data-table-container">
            <div class="table-scroll">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Preview</th>
                            <th>Image ID</th>
                            <th>Sherd ID</th>
                            <th>Metadata</th>
                            <th>Side</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div id="emptyState" class="empty-state">
                <strong>No sherds match the current filters.</strong>
                Adjust filters or clear them to load more records.
            </div>
        </div>

        <div id="mobile-cards" class="mobile-cards"></div>

        <div class="pagination" id="pagination"></div>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-container">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-controls">
                <button class="btn-secondary" type="button" onclick="updateZoom(0.2)">Zoom +</button>
                <button class="btn-secondary" type="button" onclick="updateZoom(-0.2)">Zoom -</button>
                <button class="btn-secondary" type="button" onclick="resetZoom()">Reset Zoom</button>
                <span id="zoomLabel" class="zoom-label">100%</span>
            </div>
            <div class="preview-scroll-container">
                <div class="canvas-wrapper" id="canvasWrapper">
                    <img class="modal-content" id="modalImage" alt="Sherd full preview">
                    <canvas id="bboxCanvas"></canvas>
                    <img id="maskImage" alt="Segmentation mask">
                </div>
            </div>
            <div class="modal-controls">
                <button id="segmentBtn" class="btn-primary" type="button" onclick="runSegmentation()" disabled>Run Segmentation</button>
                <button class="btn-secondary" type="button" onclick="resetCanvas()">Clear Box</button>
                <button class="btn-secondary" type="button" onclick="closeModal()">Close</button>
            </div>
            <div id="modalStatus" class="modal-status" role="status" aria-live="polite"></div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 20;

        let currentImageId = null;
        let isDrawing = false;
        let activePointerId = null;
        let startX;
        let startY;
        let currentBbox = null;
        let zoomLevel = 1.0;
        let fitZoomLevel = 1.0;
        let searchDebounce;
        let isSegmenting = false;

        const canvas = document.getElementById('bboxCanvas');
        const ctx = canvas.getContext('2d');
        canvas.style.touchAction = 'none';

        function toggleSearch() {
            const panel = document.getElementById('searchPanel');
            const toggle = document.getElementById('searchToggle');
            const isActive = panel.classList.toggle('active');
            toggle.textContent = isActive ? 'Hide Filters' : 'Show Filters';
        }

        function showError(message) {
            const banner = document.getElementById('errorBanner');
            if (!message) {
                banner.style.display = 'none';
                banner.textContent = '';
                return;
            }
            banner.textContent = message;
            banner.style.display = 'block';
        }

        function setLoading(isLoading) {
            document.getElementById('loading').style.display = isLoading ? 'block' : 'none';
        }

        function showModalStatus(message) {
            const el = document.getElementById('modalStatus');
            el.textContent = message || '';
        }

        function syncModalActionButtons() {
            const segmentBtn = document.getElementById('segmentBtn');
            const hasBbox = Array.isArray(currentBbox) && currentBbox.length === 4;
            const disabled = !hasBbox || isSegmenting;
            segmentBtn.disabled = disabled;
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function openModal(src, imageId) {
            currentImageId = imageId;
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const maskImg = document.getElementById('maskImage');

            modal.style.display = 'flex';
            modalImg.src = src;
            maskImg.style.display = 'none';
            showModalStatus('');
            currentBbox = null;
            isSegmenting = false;
            syncModalActionButtons();

            modalImg.onload = () => {
                const container = document.querySelector('.preview-scroll-container');
                const scaleX = (container.clientWidth - 40) / modalImg.naturalWidth;
                const scaleY = (container.clientHeight - 40) / modalImg.naturalHeight;
                const initialScale = Math.min(scaleX, scaleY, 1.0);

                canvas.width = modalImg.naturalWidth;
                canvas.height = modalImg.naturalHeight;
                fitZoomLevel = initialScale;
                zoomLevel = fitZoomLevel;
                applyZoom();
                resetCanvas();
            };

            modalImg.onerror = () => {
                showModalStatus('Failed to load this image preview.');
                resetCanvas();
            };
        }

        function closeModal() {
            resetCanvas();
            currentImageId = null;
            isDrawing = false;
            activePointerId = null;
            fitZoomLevel = 1.0;
            showModalStatus('');
            document.getElementById('imageModal').style.display = 'none';
        }

        function updateZoom(delta) {
            zoomLevel = Math.max(0.1, Math.min(5.0, zoomLevel + delta));
            zoomLevel = Math.round(zoomLevel * 1000) / 1000;
            applyZoom();
        }

        function resetZoom() {
            zoomLevel = fitZoomLevel;
            applyZoom();
        }

        function applyZoom() {
            const wrapper = document.getElementById('canvasWrapper');
            const modalImg = document.getElementById('modalImage');
            const maskImg = document.getElementById('maskImage');
            const container = document.querySelector('.preview-scroll-container');
            const zoomLabel = document.getElementById('zoomLabel');
            const displayWidth = Math.max(1, Math.round(canvas.width * zoomLevel));
            const displayHeight = Math.max(1, Math.round(canvas.height * zoomLevel));

            wrapper.style.width = `${displayWidth}px`;
            wrapper.style.height = `${displayHeight}px`;
            modalImg.style.width = `${displayWidth}px`;
            modalImg.style.height = `${displayHeight}px`;
            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
            maskImg.style.width = `${displayWidth}px`;
            maskImg.style.height = `${displayHeight}px`;
            zoomLabel.textContent = `${Math.round(zoomLevel * 100)}%`;

            requestAnimationFrame(() => {
                container.scrollLeft = Math.max(0, (container.scrollWidth - container.clientWidth) / 2);
                container.scrollTop = Math.max(0, (container.scrollHeight - container.clientHeight) / 2);
            });
        }

        function getPointerPos(event) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: clamp((event.clientX - rect.left) * scaleX, 0, canvas.width),
                y: clamp((event.clientY - rect.top) * scaleY, 0, canvas.height)
            };
        }

        function finishDrawing(event) {
            if (!isDrawing || event.pointerId !== activePointerId) return;
            isDrawing = false;
            const pos = getPointerPos(event);

            const x1 = Math.min(startX, pos.x);
            const y1 = Math.min(startY, pos.y);
            const x2 = Math.max(startX, pos.x);
            const y2 = Math.max(startY, pos.y);

            if (Math.abs(x2 - x1) < 3 || Math.abs(y2 - y1) < 3) {
                resetCanvas();
                return;
            }

            currentBbox = [x1, y1, x2, y2];
            syncModalActionButtons();
        }

        canvas.addEventListener('pointerdown', (event) => {
            isDrawing = true;
            activePointerId = event.pointerId;
            const pos = getPointerPos(event);
            startX = pos.x;
            startY = pos.y;
            document.getElementById('maskImage').style.display = 'none';
            showModalStatus('');
            if (canvas.setPointerCapture) {
                canvas.setPointerCapture(event.pointerId);
            }
        });

        canvas.addEventListener('pointermove', (event) => {
            if (!isDrawing || event.pointerId !== activePointerId) return;
            const pos = getPointerPos(event);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#14b8a6';
            ctx.lineWidth = 2 / zoomLevel;
            ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
        });

        canvas.addEventListener('pointerup', finishDrawing);
        canvas.addEventListener('pointercancel', (event) => {
            if (event.pointerId !== activePointerId) return;
            isDrawing = false;
            activePointerId = null;
        });
        canvas.addEventListener('lostpointercapture', () => {
            isDrawing = false;
            activePointerId = null;
        });

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('maskImage').style.display = 'none';
            isDrawing = false;
            activePointerId = null;
            currentBbox = null;
            syncModalActionButtons();
        }

        async function runSegmentation() {
            if (!currentBbox || !currentImageId) return;

            const segmentBtn = document.getElementById('segmentBtn');
            segmentBtn.textContent = 'Processing...';
            isSegmenting = true;
            syncModalActionButtons();
            showError('');
            showModalStatus('');

            try {
                const response = await fetch('/api/segment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image_id: currentImageId,
                        bbox: currentBbox
                    })
                });

                const result = await response.json();
                if (result.mask) {
                    const maskImg = document.getElementById('maskImage');
                    maskImg.src = result.mask;
                    maskImg.style.display = 'block';
                } else {
                    showModalStatus(result.error || 'Segmentation failed.');
                }
            } catch (error) {
                console.error('Segmentation failed:', error);
                showModalStatus('Segmentation failed due to a network or server error.');
            } finally {
                segmentBtn.textContent = 'Run Segmentation';
                isSegmenting = false;
                syncModalActionButtons();
            }
        }

        async function fetchMetadata() {
            try {
                const response = await fetch('/api/metadata');
                const data = await response.json();

                populateSelect('unit', data.unit || []);
                populateSelect('part', data.part || []);
                populateSelect('type', data.type || []);
                refreshSideOptions(data.image_side || []);
            } catch (error) {
                console.error('Error fetching metadata:', error);
                showError('Unable to load metadata filters.');
            }
        }

        function populateSelect(id, values) {
            const select = document.getElementById(id);
            values.forEach((val) => {
                const option = document.createElement('option');
                option.value = val;
                option.textContent = val;
                select.appendChild(option);
            });
        }

        function refreshSideOptions(values) {
            const select = document.getElementById('side');
            const fallback = ['exterior', 'interior'];
            const available = values.length > 0 ? values : fallback;
            const active = select.value;

            select.innerHTML = '<option value="">All Sides</option>';
            available.forEach((val) => {
                const option = document.createElement('option');
                option.value = val;
                option.textContent = val.charAt(0).toUpperCase() + val.slice(1);
                select.appendChild(option);
            });
            select.value = active;
        }

        function clearFilters() {
            document.getElementById('search').value = '';
            document.getElementById('unit').value = '';
            document.getElementById('part').value = '';
            document.getElementById('type').value = '';
            document.getElementById('side').value = '';
            applyFilters();
        }

        async function loadData(page = 1) {
            currentPage = page;
            showError('');

            const search = document.getElementById('search').value.trim();
            const unit = document.getElementById('unit').value;
            const part = document.getElementById('part').value;
            const type = document.getElementById('type').value;
            const side = document.getElementById('side').value;

            setLoading(true);
            document.getElementById('table-body').innerHTML = '';
            document.getElementById('mobile-cards').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
            document.getElementById('emptyState').style.display = 'none';

            const params = new URLSearchParams({
                page,
                page_size: pageSize,
                search,
                unit,
                part,
                type,
                image_side: side
            });

            try {
                const response = await fetch(`/api/sherds?${params.toString()}`);
                const result = await response.json();

                renderContent(result.data || []);
                renderPagination(result.total_pages || 0, result.page || 1);

                if ((result.total || 0) === 0) {
                    document.getElementById('stats').textContent = 'No matching items';
                    document.getElementById('emptyState').style.display = 'block';
                } else {
                    const start = (result.page - 1) * pageSize + 1;
                    const end = Math.min(result.page * pageSize, result.total);
                    document.getElementById('stats').textContent = `Showing ${start} to ${end} of ${result.total} items`;
                }
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('stats').textContent = 'Unable to load items';
                document.getElementById('emptyState').style.display = 'block';
                showError('Failed to load sherd data. Please retry.');
            } finally {
                setLoading(false);
            }
        }

        function renderContent(data) {
            const tbody = document.getElementById('table-body');
            const mobileContainer = document.getElementById('mobile-cards');

            if (!data.length) return;

            data.forEach((item) => {
                const imgPath = `/images/${item.image_id}.jpg`;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img class="image-preview" src="${imgPath}" onclick="openModal('${imgPath}', '${item.image_id}')" onerror="this.src='https://via.placeholder.com/84x60?text=No+Img'" alt="sherd"></td>
                    <td><span class="id-chip">${item.image_id}</span></td>
                    <td>${item.sherd_id || '<span style="color:#94a3b8">-</span>'}</td>
                    <td>
                        <div style="font-size: 0.78rem; color: var(--text-muted);">${item.unit || 'Unknown unit'}</div>
                        <div style="font-weight: 700;">${item.part || '-'} / ${item.type || '-'}</div>
                    </td>
                    <td><span style="text-transform: capitalize; font-weight: 600;">${item.image_side || '-'}</span></td>
                    <td><button class="btn-segment-small" onclick="openModal('${imgPath}', '${item.image_id}')">Segment</button></td>
                `;
                tbody.appendChild(row);

                const card = document.createElement('div');
                card.className = 'sherd-card';
                card.innerHTML = `
                    <img class="card-img" src="${imgPath}" onclick="openModal('${imgPath}', '${item.image_id}')" onerror="this.src='https://via.placeholder.com/96x76?text=No+Img'" alt="sherd">
                    <div class="card-info">
                        <span class="card-id">${item.image_id}</span>
                        <div style="font-size: 0.82rem; color: var(--text-muted);">${item.unit || 'Unknown unit'}</div>
                        <div style="font-size: 0.82rem; margin-top: 2px;">${item.part || '-'} / ${item.type || '-'}</div>
                        <button class="btn-segment-small" style="width: 100%; margin-top: 8px;" onclick="openModal('${imgPath}', '${item.image_id}')">Segment</button>
                    </div>
                `;
                mobileContainer.appendChild(card);
            });
        }

        function renderPagination(totalPages, activePage) {
            const container = document.getElementById('pagination');
            container.innerHTML = '';

            if (totalPages <= 1) return;

            const startPage = Math.max(1, activePage - 2);
            const endPage = Math.min(totalPages, activePage + 2);

            container.appendChild(createPageBtn('Prev', activePage - 1, activePage === 1));

            if (startPage > 1) {
                container.appendChild(createPageBtn('1', 1));
                if (startPage > 2) {
                    const dots = document.createElement('span');
                    dots.textContent = '...';
                    dots.style.color = 'var(--text-muted)';
                    container.appendChild(dots);
                }
            }

            for (let page = startPage; page <= endPage; page += 1) {
                container.appendChild(createPageBtn(String(page), page, false, page === activePage));
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const dots = document.createElement('span');
                    dots.textContent = '...';
                    dots.style.color = 'var(--text-muted)';
                    container.appendChild(dots);
                }
                container.appendChild(createPageBtn(String(totalPages), totalPages));
            }

            container.appendChild(createPageBtn('Next', activePage + 1, activePage === totalPages));
        }

        function createPageBtn(text, page, disabled = false, active = false) {
            const button = document.createElement('button');
            button.textContent = text;
            button.className = `pagination-btn ${active ? 'active' : ''}`;
            button.disabled = disabled;
            if (!disabled) {
                button.onclick = () => loadData(page);
            }
            return button;
        }

        function applyFilters() {
            loadData(1);
        }

        document.getElementById('search').addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                clearTimeout(searchDebounce);
                applyFilters();
                return;
            }

            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => {
                applyFilters();
            }, 300);
        });

        document.getElementById('imageModal').addEventListener('click', (event) => {
            if (event.target.id === 'imageModal') {
                closeModal();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        fetchMetadata();
        loadData();
    </script>
</body>
</html>
